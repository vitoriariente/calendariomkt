<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Disparos · Junho 2026 · Estante Mágica</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --amarelo:#F9DC45;--azul:#008ECF;--roxo:#7668AC;
  --vermelho:#E94B56;--cinza:#595959;--verde:#17a05a;
  --branco:#fff;--bg:#F4F4F4;--borda:#E2E2E2;--text:#333;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
.header{background:var(--branco);border-bottom:4px solid var(--amarelo);padding:18px 32px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:13px}
.logo-mark{width:42px;height:42px;border-radius:10px;background:var(--amarelo);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--cinza)}
.h-sup{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.08em}
.h-title{font-size:19px;font-weight:800;color:var(--text)}
.h-right{display:flex;align-items:center;gap:10px}
.h-badge{background:var(--azul);color:#fff;font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.sync-status{font-size:11px;font-weight:600;color:#aaa;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.sync-dot.ok{background:var(--verde)}.sync-dot.err{background:var(--vermelho)}.sync-dot.loading{background:var(--amarelo);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SHEET CONFIG */
.sheet-config{background:#FFF9E0;border-bottom:1px solid #f0e060;padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sheet-config label{font-size:12px;font-weight:700;color:#7a5c00;white-space:nowrap}
.sheet-config input[type=text]{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;border:1px solid #e0cc40;border-radius:6px;padding:6px 10px;background:#fff;color:var(--text);width:360px;max-width:100%}
.sheet-config input:focus{outline:2px solid var(--amarelo);border-color:var(--amarelo)}
.btn-sync{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;background:var(--amarelo);color:var(--cinza);border:none;border-radius:6px;padding:7px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:opacity .15s}
.btn-sync:hover{opacity:.8}
.sheet-help{font-size:11px;color:#a08000;font-weight:600}

/* PAGE TABS — SDR / CLOSER */
.page-tabs{background:var(--cinza);display:flex;padding:0 32px;gap:4px}
.page-tab{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;padding:12px 24px;border:none;background:transparent;color:rgba(255,255,255,.45);cursor:pointer;text-transform:uppercase;letter-spacing:.07em;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .15s}
.page-tab:hover{color:rgba(255,255,255,.75)}
.page-tab.active-sdr{color:#fff;border-bottom-color:var(--azul)}
.page-tab.active-closer{color:#fff;border-bottom-color:var(--vermelho)}

/* INNER TABS — S1/S2/S3/S4/Resultados */
.inner-tabs{background:var(--branco);border-bottom:1px solid var(--borda);padding:0 32px;display:flex;gap:2px;overflow-x:auto}
.inner-tab{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:12px 18px;border:none;background:transparent;cursor:pointer;color:#aaa;border-bottom:3px solid transparent;margin-bottom:-1px;text-transform:uppercase;letter-spacing:.05em;transition:all .15s;white-space:nowrap}
.inner-tab:hover{color:var(--cinza)}
.inner-tab.active{color:var(--azul);border-bottom-color:var(--azul)}
.inner-tab.t-res.active{color:var(--verde);border-bottom-color:var(--verde)}
.inner-tab.t-res-closer.active{color:var(--vermelho);border-bottom-color:var(--vermelho)}

/* MAIN */
.main{padding:24px 32px;max-width:1100px;margin:0 auto}

/* ALERTA */
.alerta{background:#FFF9E0;border-left:4px solid var(--amarelo);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;font-weight:600;color:#7a5c00;margin-bottom:18px}
.alerta-test{background:#F3F1FF;border-left:4px solid var(--roxo);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;font-weight:600;color:#4a3d80;margin-bottom:18px}
.alerta-pausa{background:#f9f9f9;border-left:4px solid #ccc;border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;font-weight:600;color:#999;margin-bottom:18px}

/* RESUMO */
.resumo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.resumo-card{background:var(--branco);border-radius:12px;border:1px solid var(--borda);padding:14px 16px;display:flex;align-items:center;gap:11px}
.r-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.r-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.r-val{font-size:21px;font-weight:800;color:var(--text);line-height:1.1}
.r-sub{font-size:10px;color:#bbb;font-weight:600;margin-top:1px}

/* LEGENDA */
.legenda{display:flex;flex-wrap:wrap;gap:10px;background:var(--branco);border-radius:10px;border:1px solid var(--borda);padding:12px 16px;margin-bottom:20px;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.04em}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-sep{width:1px;height:18px;background:var(--borda);margin:0 4px}

/* WEEK GRID */
.week-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.day-card{background:var(--branco);border-radius:14px;border:1px solid var(--borda);overflow:hidden}
.day-card.feriado{opacity:.4}
.day-header{padding:11px 14px 9px;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between}
.day-nome{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text)}
.day-data{font-size:10px;color:#aaa;font-weight:600;margin-top:1px}
.day-num{font-size:20px;font-weight:800;color:#ddd}
.tag-feriado{font-size:9px;font-weight:700;background:#FAEEDA;color:#a06000;border-radius:4px;padding:2px 6px;text-transform:uppercase;display:inline-block;margin-top:3px}
.tag-semdisparo{font-size:9px;font-weight:700;background:#f0f0f0;color:#aaa;border-radius:4px;padding:2px 6px;text-transform:uppercase;display:inline-block;margin-top:3px}

/* ROWS */
.day-rows{display:flex;flex-direction:column}
.row{padding:9px 12px;border-bottom:1px solid var(--borda);min-height:70px;display:flex;flex-direction:column;justify-content:center}
.row:last-child{border-bottom:none}
.row.vazio{opacity:.15;pointer-events:none}
.row.pausado{opacity:.3}
.row-nome{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.row-vol{font-size:13px;font-weight:800}
.row-exp{font-size:10px;font-weight:600;margin-top:1px}
.row-pausa-tag{font-size:9px;font-weight:700;color:#aaa;background:#f5f5f5;border-radius:4px;padding:2px 6px;display:inline-block;margin-top:3px}
.row-resultado{display:flex;align-items:center;gap:5px;margin-top:6px;padding-top:6px;border-top:1px dashed rgba(0,0,0,.1)}
.res-label{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
.res-val{font-size:12px;font-weight:800}
.res-arrow{font-size:13px;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-weight:800}
.res-arrow.acima{background:#E8F9EF;color:#17a05a}.res-arrow.dentro{background:#EAF5FF;color:var(--azul)}.res-arrow.abaixo{background:#FDEAEA;color:var(--vermelho)}
.res-val.acima{color:#17a05a}.res-val.dentro{color:var(--azul)}.res-val.abaixo{color:var(--vermelho)}

/* SDR CORES */
.row-outbound{background:#EAF5FF}.row-outbound .row-nome{color:#005a8a}.row-outbound .row-vol{color:var(--azul)}.row-outbound .row-exp{color:#0078b0}
.row-anos{background:#F0FCF5}.row-anos .row-nome{color:#0d5c2c}.row-anos .row-vol{color:#17a05a}.row-anos .row-exp{color:#17a05a}
.row-concorrencia{background:#FFF0F4}.row-concorrencia .row-nome{color:#8a1020}.row-concorrencia .row-vol{color:var(--vermelho)}.row-concorrencia .row-exp{color:#c23050}
.row-retracao{background:#FFFBEA}.row-retracao .row-nome{color:#7a5000}.row-retracao .row-vol{color:#c98c00}.row-retracao .row-exp{color:#c98c00}
.row-renovpart{background:#F3F1FF}.row-renovpart .row-nome{color:#4a3d80}.row-renovpart .row-vol{color:var(--roxo)}.row-renovpart .row-exp{color:#6055a0}
.row-renovpub{background:#E8FBF5}.row-renovpub .row-nome{color:#005c45}.row-renovpub .row-vol{color:#009970}.row-renovpub .row-exp{color:#009970}

/* CLOSER CORES */
.row-fup{background:#FFF5F5}.row-fup .row-nome{color:#8a1020}.row-fup .row-vol{color:var(--vermelho)}.row-fup .row-exp{color:#c23050}
.row-fechado{background:#F0FCF5}.row-fechado .row-nome{color:#0d5c2c}.row-fechado .row-vol{color:#17a05a}.row-fechado .row-exp{color:#17a05a}
.row-perdido{background:#FFFBEA}.row-perdido .row-nome{color:#7a5000}.row-perdido .row-vol{color:#c98c00}.row-perdido .row-exp{color:#c98c00}
.row-revenda{background:#F3F1FF}.row-revenda .row-nome{color:#4a3d80}.row-revenda .row-vol{color:var(--roxo)}.row-revenda .row-exp{color:#6055a0}

/* RESULTADOS */
.res-toggle{display:flex;gap:8px;margin-bottom:20px}
.res-toggle-btn{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:1.5px solid var(--borda);background:var(--branco);cursor:pointer;color:#aaa;text-transform:uppercase;letter-spacing:.05em;transition:all .15s}
.res-toggle-btn.active-sdr{background:#E8F9EF;border-color:var(--verde);color:var(--verde)}
.res-toggle-btn.active-closer{background:#FDEAEA;border-color:var(--vermelho);color:var(--vermelho)}
.res-table-wrap{overflow-x:auto;margin-bottom:20px}
.res-table{width:100%;border-collapse:collapse;font-size:12px}
.res-table th{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:2px solid var(--borda);white-space:nowrap}
.res-table td{padding:9px 12px;border-bottom:1px solid #f5f5f5;font-weight:600;vertical-align:middle}
.res-table tr:last-child td{border-bottom:none}
.res-table tr:hover td{background:#fafafa}
.badge-perf{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-acima{background:#E8F9EF;color:#17a05a}.badge-dentro{background:#EAF5FF;color:var(--azul)}.badge-abaixo{background:#FDEAEA;color:var(--vermelho)}
.tag-bald{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block}
.tag-outbound{background:#EAF5FF;color:#005a8a}.tag-anos{background:#F0FCF5;color:#0d5c2c}
.tag-concorrencia{background:#FFF0F4;color:#8a1020}.tag-retracao{background:#FFFBEA;color:#7a5000}
.tag-renovpart{background:#F3F1FF;color:#4a3d80}.tag-renovpub{background:#E8FBF5;color:#005c45}
.tag-fup{background:#FFF5F5;color:#8a1020}.tag-fechado{background:#F0FCF5;color:#0d5c2c}
.tag-perdido{background:#FFFBEA;color:#7a5000}.tag-revenda{background:#F3F1FF;color:#4a3d80}

/* CLOSER BASE CONFIG */
.closer-config{background:var(--branco);border-radius:12px;border:1px solid var(--borda);padding:16px 20px;margin-bottom:20px}
.closer-config-title{font-size:11px;font-weight:800;color:var(--cinza);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.closer-config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.base-field{display:flex;flex-direction:column;gap:4px}
.base-field label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em}
.base-field .base-desc{font-size:10px;color:#bbb;font-weight:600}
.base-input{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;border:1.5px solid var(--borda);border-radius:6px;padding:6px 10px;width:100%;color:var(--text)}
.base-input:focus{outline:none;border-color:var(--vermelho)}

/* REGRAS */
.regras{background:var(--branco);border-radius:12px;border:1px solid var(--borda);padding:16px 20px;margin-top:22px}
.regras-title{font-size:11px;font-weight:800;color:var(--cinza);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.regras-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.regra-item{display:flex;gap:8px;align-items:flex-start}
.regra-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.regra-item p{font-size:11px;color:#777;font-weight:600;line-height:1.5}
.regra-item strong{color:var(--text)}

.empty-state{text-align:center;padding:40px 20px;color:#bbb}
.empty-state .ei{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:13px;font-weight:600}
.empty-state small{font-size:11px;display:block;margin-top:4px}

@media(max-width:700px){
  .week-grid{grid-template-columns:repeat(2,1fr)}
  .resumo-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:14px}.header,.sheet-config,.page-tabs{padding-left:14px;padding-right:14px}
  .inner-tabs{padding:0 14px}.sheet-config input[type=text]{width:100%}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">EM</div>
    <div>
      <div class="h-sup">Estante Mágica · Marketing</div>
      <div class="h-title">Calendário de Disparos · Junho 2026</div>
    </div>
  </div>
  <div class="h-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Aguardando planilha</span>
    </div>
    <div class="h-badge">Junho 2026</div>
  </div>
</header>

<div class="sheet-config">
  <label>🔗 ID da planilha:</label>
  <input type="text" id="sheetId" placeholder="Cole o ID da planilha Google Sheets de junho" />
  <button class="btn-sync" onclick="syncSheet()">↻ Sincronizar</button>
  <span class="sheet-help">Planilha pública · compartilhar → qualquer pessoa com o link → visualizador</span>
</div>

<!-- PAGE TABS -->
<div class="page-tabs">
  <button class="page-tab active-sdr" id="pageTabSdr" onclick="setPage('sdr')">SDR</button>
  <button class="page-tab" id="pageTabCloser" onclick="setPage('closer')">Closer</button>
</div>

<!-- INNER TABS SDR -->
<div class="inner-tabs" id="innerTabsSdr">
  <button class="inner-tab active" onclick="showSdrTab(0)">S1 · 05/06</button>
  <button class="inner-tab" onclick="showSdrTab(1)">S2 · 11–14/06</button>
  <button class="inner-tab" onclick="showSdrTab(2)">S3 · 18–21/06</button>
  <button class="inner-tab" onclick="showSdrTab(3)">S4 · 25–28/06</button>
  <button class="inner-tab t-res" onclick="showSdrTab(4)">📊 Resultados</button>
</div>

<!-- INNER TABS CLOSER -->
<div class="inner-tabs" id="innerTabsCloser" style="display:none">
  <button class="inner-tab active" onclick="showCloserTab(2)">S3 · 18–21/06</button>
  <button class="inner-tab" onclick="showCloserTab(3)">S4 · 25–28/06</button>
  <button class="inner-tab t-res-closer" onclick="showCloserTab(4)">📊 Resultados</button>
</div>

<div class="main" id="mainContent"></div>

<script>
// ── DADOS BASE ───────────────────────────────────────────────────────
const SDR_ORDEM = ['outbound','anos','concorrencia','retracao','renovpart','renovpub'];
const SDR_B = {
  outbound:     {nome:"Outbound novas",    baseTotal:13015, exp:[15,19], cls:"row-outbound",    tag:"tag-outbound"},
  anos:         {nome:"Anos anteriores",   baseTotal:1810,  exp:[6,10],  cls:"row-anos",        tag:"tag-anos"},
  concorrencia: {nome:"Concorrência",      baseTotal:1610,  exp:[6,10],  cls:"row-concorrencia",tag:"tag-concorrencia"},
  retracao:     {nome:"Retração",          baseTotal:1268,  exp:[4,8],   cls:"row-retracao",    tag:"tag-retracao"},
  renovpart:    {nome:"Renov. part >2k",   baseTotal:212,   exp:[2,4],   cls:"row-renovpart",   tag:"tag-renovpart"},
  renovpub:     {nome:"Renov. pub HT",     baseTotal:363,   exp:[4,6],   cls:"row-renovpub",    tag:"tag-renovpub"},
};

const CLOSER_ORDEM = ['fup','fechado','perdido','revenda'];
const CLOSER_B = {
  fup:     {nome:"FUP",             desc:"Escola ainda não decidiu",       baseTotal:0, cls:"row-fup",     tag:"tag-fup"},
  fechado: {nome:"Negócio Fechado", desc:"Fechou mas não enviou lista",    baseTotal:0, cls:"row-fechado", tag:"tag-fechado"},
  perdido: {nome:"Negócio Perdido", desc:"Decidiu não aplicar este ano",   baseTotal:0, cls:"row-perdido", tag:"tag-perdido"},
  revenda: {nome:"Revenda",         desc:"Seguiu os passos, sem listagem", baseTotal:0, cls:"row-revenda", tag:"tag-revenda"},
};

// Semanas
const plano = [
  {label:"S1", range:"05/06", dias:[
    {d:"Seg",dt:"04/06",iso:"2026-06-04",num:"04",f:false,semDisparo:true},
    {d:"Ter",dt:"05/06",iso:"2026-06-05",num:"05",f:false},
    {d:"Qua",dt:"06/06",iso:"2026-06-06",num:"06",f:false,semDisparo:true},
    {d:"Qui",dt:"07/06",iso:"2026-06-07",num:"07",f:true},
  ]},
  {label:"S2", range:"11–14/06", dias:[
    {d:"Seg",dt:"11/06",iso:"2026-06-11",num:"11",f:false},
    {d:"Ter",dt:"12/06",iso:"2026-06-12",num:"12",f:false},
    {d:"Qua",dt:"13/06",iso:"2026-06-13",num:"13",f:false},
    {d:"Qui",dt:"14/06",iso:"2026-06-14",num:"14",f:false},
  ]},
  {label:"S3", range:"18–21/06", dias:[
    {d:"Seg",dt:"18/06",iso:"2026-06-18",num:"18",f:false},
    {d:"Ter",dt:"19/06",iso:"2026-06-19",num:"19",f:false},
    {d:"Qua",dt:"20/06",iso:"2026-06-20",num:"20",f:false},
    {d:"Qui",dt:"21/06",iso:"2026-06-21",num:"21",f:false},
  ]},
  {label:"S4", range:"25–28/06", dias:[
    {d:"Seg",dt:"25/06",iso:"2026-06-25",num:"25",f:false},
    {d:"Ter",dt:"26/06",iso:"2026-06-26",num:"26",f:false},
    {d:"Qua",dt:"27/06",iso:"2026-06-27",num:"27",f:false},
    {d:"Qui",dt:"28/06",iso:"2026-06-28",num:"28",f:false},
  ]},
];

// SDR alocação por semana
// outbound: toda semana, base inteira / dias
// anos/concorrencia/retracao: S1+S2 (teste frequência), S3+S4; base inteira / dias
// renovpart/renovpub: S1 e S3 apenas
const sdrAloc = [
  {outbound:[1], anos:[1], concorrencia:[1], retracao:[1], renovpart:[1], renovpub:[1]},
  {outbound:[0,1,2,3], anos:[0,2], concorrencia:[1,3], retracao:[0,2]},
  {outbound:[0,1,2,3], anos:[0,2], concorrencia:[1,3], retracao:[0,2], renovpart:[1], renovpub:[3]},
  {outbound:[0,1,2,3], anos:[1,3], concorrencia:[0,2], retracao:[1,3]},
];

// Closer: S1 e S2 sem disparo; S3 e S4 com 2x/semana por tipo
const closerAloc = [
  null, null,
  {fup:[0,2], fechado:[1,3], perdido:[0,3], revenda:[1,2]},
  {fup:[1,3], fechado:[0,2], perdido:[1,2], revenda:[0,3]},
];

const sdrAlertas = [
  '📅 S1 · só terça 05/06. Todos os baldinhos ativos — base inteira de cada um.',
  '🧪 S2 · teste de frequência — anos anteriores, concorrência e retração disparam para os mesmos contatos da S1. Renovações em pausa.',
  '📅 S3 · todos voltam. Renovações retomam aqui.',
  '🧪 S4 · anos anteriores, concorrência e retração repetem os contatos da S3. Renovações em pausa.',
];

let disparos = {};
let page = 'sdr';
let sdrTab = 0;
let closerTab = 2;
let resView = 'sdr';

// ── UTILS ─────────────────────────────────────────────────────────────
function fmt(n){return Math.round(n).toLocaleString('pt-BR')}
function getPerf(r,mn,mx){return r>mx?'acima':r<mn?'abaixo':'dentro'}
function arrow(p){return p==='acima'?'↑':p==='abaixo'?'↓':'→'}
function parseNum(v){if(!v&&v!==0)return 0;if(typeof v==='number')return v;return Number(String(v).replace(/[^0-9.-]/g,''))||0;}

function sdrVolDia(key,si){
  const aloc=(sdrAloc[si]||{})[key]||[];
  if(!aloc.length) return 0;
  return Math.round(SDR_B[key].baseTotal/aloc.length);
}
function closerVolDia(key,si){
  const aloc=(closerAloc[si]||{})[key]||[];
  if(!aloc.length) return 0;
  const base=CLOSER_B[key].baseTotal||0;
  if(!base) return 0;
  return Math.round(base/aloc.length);
}

function getAgg(iso,baldKey,time){
  const lista=(disparos[iso]||[]).filter(d=>d.bald===baldKey&&d.time===time);
  if(!lista.length) return null;
  return {lev:lista.reduce((s,d)=>s+d.levantadas,0),conv:lista.reduce((s,d)=>s+d.conversoes,0),count:lista.length};
}

// ── RENDER DAY HEADER ─────────────────────────────────────────────────
function dayHeader(dia){
  const tag = dia.f
    ? '<span class="tag-feriado">Feriado</span>'
    : dia.semDisparo ? '<span class="tag-semdisparo">Sem disparo</span>' : '';
  return `<div class="day-header">
    <div><div class="day-nome">${dia.d}</div><div class="day-data">${dia.dt}</div>${tag}</div>
    <div class="day-num">${dia.num}</div>
  </div>`;
}

// ── SDR WEEK ─────────────────────────────────────────────────────────
function renderSdrWeek(si){
  const s = plano[si];
  let totalCont=0, expMin=0, expMax=0, totalReal=0, temReal=false;

  // pre-calc map
  const map = s.dias.map((_,di)=>{
    const m={};
    SDR_ORDEM.forEach(k=>{
      if((sdrAloc[si][k]||[]).includes(di) && !s.dias[di].f && !s.dias[di].semDisparo)
        m[k]=sdrVolDia(k,si);
    });
    return m;
  });

  s.dias.forEach((dia,di)=>{
    Object.entries(map[di]).forEach(([k,vol])=>{
      totalCont+=vol; expMin+=SDR_B[k].exp[0]; expMax+=SDR_B[k].exp[1];
    });
    SDR_ORDEM.forEach(k=>{
      if(map[di][k]){ const a=getAgg(dia.iso,k,'SDR'); if(a){totalReal+=a.lev;temReal=true;} }
    });
  });

  let html = `<div class="alerta">${sdrAlertas[si]}</div>`;
  html += `<div class="resumo-grid">
    <div class="resumo-card"><div class="r-icon" style="background:#E8F5FF">📅</div><div><div class="r-label">Dias ativos</div><div class="r-val">${s.dias.filter(d=>!d.f&&!d.semDisparo).length}</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#FFF0F5">📨</div><div><div class="r-label">Contatos planejados</div><div class="r-val">${fmt(totalCont)}</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#FFFBEA">🎯</div><div><div class="r-label">Levantadas esperadas</div><div class="r-val">${expMin}–${expMax}</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#E8F9EF">✅</div><div><div class="r-label">Levantadas reais</div><div class="r-val" style="color:${temReal?'var(--verde)':'#ddd'}">${temReal?totalReal:'–'}</div></div></div>
  </div>`;

  html += '<div class="week-grid">';
  s.dias.forEach((dia,di)=>{
    const inactive = dia.f || dia.semDisparo;
    html += `<div class="day-card${dia.f?' feriado':''}">${dayHeader(dia)}<div class="day-rows">`;
    if(inactive){
      html += `<div style="padding:12px;font-size:11px;font-weight:700;color:#ccc">—</div>`;
    } else {
      SDR_ORDEM.forEach(k=>{
        const b=SDR_B[k];
        const vol=map[di][k];
        const ativo=vol!==undefined;
        const ativoSem=(sdrAloc[si][k]||[]).length>0;
        let rowClass=b.cls, extra='', resHtml='';
        if(!ativoSem){ rowClass+=' pausado'; extra='<span class="row-pausa-tag">⏸ pausa</span>'; }
        else if(!ativo){ rowClass+=' vazio'; }
        if(ativo){
          const agg=getAgg(dia.iso,k,'SDR');
          if(agg){
            const perf=getPerf(agg.lev,b.exp[0],b.exp[1]);
            resHtml=`<div class="row-resultado"><span class="res-label">SDR:</span><span class="res-val ${perf}">${agg.lev}</span><span class="res-arrow ${perf}">${arrow(perf)}</span></div>`;
          } else {
            resHtml=`<div class="row-resultado"><span style="font-size:9px;color:#ddd;font-weight:600">Aguardando resultado</span></div>`;
          }
        }
        html+=`<div class="row ${rowClass}">
          <div class="row-nome">${b.nome}</div>
          <div class="row-vol">${ativo?fmt(vol)+' contatos':ativoSem?'–':fmt(b.baseTotal)+' total'}</div>
          ${ativo?`<div class="row-exp">~${b.exp[0]}–${b.exp[1]} levantadas</div>`:''}
          ${extra}${resHtml}
        </div>`;
      });
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

// ── SDR RESULTADOS ────────────────────────────────────────────────────
function renderSdrResultados(){
  const rows=[];
  plano.forEach((s,si)=>{
    s.dias.forEach((dia,di)=>{
      if(dia.f||dia.semDisparo) return;
      (disparos[dia.iso]||[]).filter(d=>d.time==='SDR').forEach(d=>{
        const b=SDR_B[d.bald]; if(!b) return;
        const perf=getPerf(d.levantadas,b.exp[0],b.exp[1]);
        rows.push({sem:s.label,data:dia.dt,bald:d.bald,b,oferta:d.oferta,base:d.base,entregues:d.entregues,lidos:d.lidos,resp:d.resp,lev:d.levantadas,perf});
      });
    });
  });
  if(!rows.length) return `<div class="empty-state"><div class="ei">📊</div><p>Nenhum resultado SDR ainda</p><small>Sincronize a planilha para ver os dados</small></div>`;
  const totLev=rows.reduce((s,r)=>s+r.lev,0);
  const acima=rows.filter(r=>r.perf==='acima').length, dentro=rows.filter(r=>r.perf==='dentro').length, abaixo=rows.filter(r=>r.perf==='abaixo').length;
  let html=`<div class="resumo-grid" style="margin-bottom:20px">
    <div class="resumo-card"><div class="r-icon" style="background:#E8F9EF">🎯</div><div><div class="r-label">Total levantadas</div><div class="r-val" style="color:var(--verde)">${totLev}</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#E8F9EF">↑</div><div><div class="r-label">Acima</div><div class="r-val" style="color:var(--verde)">${acima}</div><div class="r-sub">disparos</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#EAF5FF">→</div><div><div class="r-label">Dentro</div><div class="r-val" style="color:var(--azul)">${dentro}</div><div class="r-sub">disparos</div></div></div>
    <div class="resumo-card"><div class="r-icon" style="background:#FDEAEA">↓</div><div><div class="r-label">Abaixo</div><div class="r-val" style="color:var(--vermelho)">${abaixo}</div><div class="r-sub">disparos</div></div></div>
  </div>
  <div class="res-table-wrap"><table class="res-table">
    <thead><tr><th>Sem.</th><th>Data</th><th>Baldinho</th><th>Oferta</th><th>Base</th><th>Entregues</th><th>Lidos</th><th>Resp.</th><th>Esperado</th><th>Real</th><th>Status</th></tr></thead>
    <tbody>`;
  rows.forEach(r=>{
    const bc=r.perf==='acima'?'badge-acima':r.perf==='abaixo'?'badge-abaixo':'badge-dentro';
    html+=`<tr><td>${r.sem}</td><td>${r.data}</td><td><span class="tag-bald ${r.b.tag}">${r.b.nome}</span></td>
      <td style="color:#888;font-size:11px">${r.oferta||'–'}</td>
      <td>${r.base?fmt(r.base):'–'}</td><td>${r.entregues?fmt(r.entregues):'–'}</td>
      <td>${r.lidos?fmt(r.lidos):'–'}</td><td>${r.resp?fmt(r.resp):'–'}</td>
      <td style="color:#aaa">${r.b.exp[0]}–${r.b.exp[1]}</td>
      <td style="font-weight:800;color:${r.perf==='acima'?'var(--verde)':r.perf==='abaixo'?'var(--vermelho)':'var(--azul)'}">${r.lev}</td>
      <td><span class="badge-perf ${bc}">${arrow(r.perf)} ${r.perf.charAt(0).toUpperCase()+r.perf.slice(1)}</span></td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  return html;
}

// ── CLOSER WEEK ───────────────────────────────────────────────────────
function renderCloserWeek(si){
  const s = plano[si];
  const aloc = closerAloc[si];
  const semAtiva = !!aloc;

  let html = '';
  if(!semAtiva){
    html += `<div class="alerta-pausa">⏸ ${s.label} sem disparos Closer. Os disparos Closer acontecem em S3 e S4.</div>`;
  } else {
    html += `<div class="alerta">📅 ${s.label} · Closer ativo · 2x por semana por tipo · Objetivo: recebimento de lista</div>`;
  }

  // resumo
  if(semAtiva){
    let totalCont=0, totalReal=0, temReal=false;
    s.dias.forEach((dia,di)=>{
      CLOSER_ORDEM.forEach(k=>{
        if((aloc[k]||[]).includes(di)&&!dia.f){
          totalCont+=closerVolDia(k,si)||0;
          const a=getAgg(dia.iso,k,'CLOSER'); if(a){totalReal+=a.conv;temReal=true;}
        }
      });
    });
    html+=`<div class="resumo-grid">
      <div class="resumo-card"><div class="r-icon" style="background:#FFF5F5">🎯</div><div><div class="r-label">Objetivo</div><div class="r-val" style="font-size:13px;color:var(--vermelho)">Conversão</div></div></div>
      <div class="resumo-card"><div class="r-icon" style="background:#FFF5F5">📨</div><div><div class="r-label">Contatos planejados</div><div class="r-val">${totalCont?fmt(totalCont):'–'}</div></div></div>
      <div class="resumo-card"><div class="r-icon" style="background:#F3F1FF">✅</div><div><div class="r-label">Conversões reais</div><div class="r-val" style="color:${temReal?'var(--roxo)':'#ddd'}">${temReal?totalReal:'–'}</div></div></div>
      <div class="resumo-card" style="border-style:dashed">
        <div style="font-size:11px;font-weight:600;color:#aaa;line-height:1.5">Preencha as bases na configuração abaixo para ver os volumes por dia</div>
      </div>
    </div>`;
  }

  // config de bases (sempre visível)
  html += `<div class="closer-config">
    <div class="closer-config-title">📋 Tamanho das bases · Closer</div>
    <div class="closer-config-grid">`;
  CLOSER_ORDEM.forEach(k=>{
    const b=CLOSER_B[k];
    html+=`<div class="base-field">
      <label>${b.nome}</label>
      <input class="base-input" type="number" min="0" placeholder="nº contatos"
        value="${b.baseTotal||''}"
        oninput="CLOSER_B['${k}'].baseTotal=parseInt(this.value)||0;refreshCloserTab()" />
      <span class="base-desc">${b.desc}</span>
    </div>`;
  });
  html += `</div></div>`;

  // grade de dias
  html += '<div class="week-grid">';
  s.dias.forEach((dia,di)=>{
    const inactive = dia.f || dia.semDisparo || !semAtiva;
    html += `<div class="day-card${dia.f?' feriado':''}">${dayHeader(dia)}<div class="day-rows">`;
    if(inactive){
      html += `<div style="padding:12px;font-size:11px;font-weight:700;color:#ccc">—</div>`;
    } else {
      CLOSER_ORDEM.forEach(k=>{
        const b=CLOSER_B[k];
        const ativo=(aloc[k]||[]).includes(di);
        const vol=ativo?closerVolDia(k,si):0;
        const agg=ativo?getAgg(dia.iso,k,'CLOSER'):null;
        let resHtml='';
        if(ativo){
          if(agg) resHtml=`<div class="row-resultado"><span class="res-label">Conv.:</span><span style="font-size:12px;font-weight:800;color:var(--roxo)">${agg.conv}</span></div>`;
          else resHtml=`<div class="row-resultado"><span style="font-size:9px;color:#ddd;font-weight:600">Aguardando resultado</span></div>`;
        }
        html+=`<div class="row ${b.cls}${ativo?'':' vazio'}">
          <div class="row-nome">${b.nome}</div>
          <div class="row-vol">${ativo?(vol?fmt(vol)+' contatos':'Base não informada'):'–'}</div>
          ${ativo?`<div class="row-exp">Objetivo: conversão</div>`:''}
          ${resHtml}
        </div>`;
      });
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function setPage(p){
  page = p;
  document.getElementById('pageTabSdr').className = 'page-tab' + (p==='sdr'?' active-sdr':'');
  document.getElementById('pageTabCloser').className = 'page-tab' + (p==='closer'?' active-closer':'');
  document.getElementById('innerTabsSdr').style.display = p==='sdr'?'flex':'none';
  document.getElementById('innerTabsCloser').style.display = p==='closer'?'flex':'none';
  render();
}

function showSdrTab(idx){
  sdrTab=idx;
  document.querySelectorAll('#innerTabsSdr .inner-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  render();
}
function showCloserTab(idx){
  closerTab=idx;
  // buttons: 0=S3, 1=S4, 2=Resultados → map to real indices 2,3,4
  const btnIdx = idx===2?0:idx===3?1:2;
  document.querySelectorAll('#innerTabsCloser .inner-tab').forEach((t,i)=>t.classList.toggle('active',i===btnIdx));
  render();
}
function refreshCloserTab(){ if(page==='closer') render(); }

function render(){
  const c = document.getElementById('mainContent');
  if(page==='sdr'){
    if(sdrTab===4) c.innerHTML = renderSdrResultados() + renderRegrasSdr();
    else c.innerHTML = renderSdrWeek(sdrTab) + renderRegrasSdr();
  } else {
    if(closerTab===4) c.innerHTML = renderCloserResultados() + renderRegrasCloser();
    else c.innerHTML = renderCloserWeek(closerTab) + renderRegrasCloser();
  }
}

// ── SYNC SHEETS ───────────────────────────────────────────────────────
function normBald(b){
  if(!b) return null;
  b=b.toLowerCase().trim();
  if(b.includes('outbound')) return 'outbound';
  if(b.includes('anos')) return 'anos';
  if(b.includes('concorr')) return 'concorrencia';
  if(b.includes('retra')) return 'retracao';
  if(b.includes('pub')) return 'renovpub';
  if(b.includes('renov')) return 'renovpart';
  if(b.includes('fup')) return 'fup';
  if(b.includes('fechado')) return 'fechado';
  if(b.includes('perdido')) return 'perdido';
  if(b.includes('revenda')) return 'revenda';
  return null;
}
function normData(d){
  if(!d) return null;
  d=String(d).trim();
  const m1=d.match(/^(\d{1,2})\/(\d{1,2})/);
  if(m1) return `2026-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`;
  const m2=d.match(/Date\((\d+),(\d+),(\d+)\)/);
  if(m2) return `${m2[1]}-${String(Number(m2[2])+1).padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  return null;
}
function setSyncStatus(e,t){
  document.getElementById('syncDot').className='sync-dot '+e;
  document.getElementById('syncLabel').textContent=t;
}
async function syncSheet(){
  const id=document.getElementById('sheetId').value.trim();
  if(!id){alert('Cole o ID da planilha acima.');return;}
  setSyncStatus('loading','Sincronizando...');
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text=await res.text();
    const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    disparos={};
    let count=0;
    (json.table.rows||[]).forEach(row=>{
      const c=row.c; if(!c||c.length<10) return;
      const iso=normData(c[1]?.v); if(!iso) return;
      const timeStr=String(c[4]?.v||'').trim().toUpperCase();
      if(!timeStr.includes('SDR')&&!timeStr.includes('CLOSER')) return;
      const bald=normBald(String(c[9]?.v||'')); if(!bald) return;
      if(!disparos[iso]) disparos[iso]=[];
      disparos[iso].push({
        time:timeStr.includes('SDR')?'SDR':'CLOSER', bald,
        oferta:String(c[5]?.v||''), base:parseNum(c[10]?.v),
        entregues:parseNum(c[11]?.v), lidos:parseNum(c[13]?.v),
        resp:parseNum(c[14]?.v), levantadas:parseNum(c[15]?.v), conversoes:parseNum(c[17]?.v),
      });
      count++;
    });
    setSyncStatus('ok',`Sincronizado · ${count} linha${count!==1?'s':''}`);
    localStorage.setItem('em_sheet_jun',id);
    render();
  }catch(e){
    setSyncStatus('err','Erro ao sincronizar');
    alert('Não foi possível ler a planilha.\n\n1. ID correto?\n2. Planilha pública (visualizador)?\n3. Dados na primeira aba?');
  }
}

window.addEventListener('load',()=>{
  const saved=localStorage.getItem('em_sheet_jun');
  if(saved) document.getElementById('sheetId').value=saved;
  // Closer começa na S3 (tab real idx=2, btn idx=0)
  closerTab=2;
  document.querySelectorAll('#innerTabsCloser .inner-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  render();
});
</script>
